---
apiVersion: v1
kind: Pod
metadata:
  name: my-go-app
  labels:
    app: go-app
spec:
  containers:
  - name: go-container
    image: ghcr.io/kivi-9/containers-lab-1/app:sha-4cea3f8
    ports:
    - containerPort: 8080
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
  imagePullSecrets:
  - name: ghcr-secret
