name: Validate Kubernetes Manifests

on:
  push:
    paths:
      - 'k8s/**/*.yaml'
      - '.github/workflows/k8s-validate.yml'
  pull_request:
    paths:
      - 'k8s/**/*.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Lint YAML files
      uses: ibiqlik/action-yamllint@v3
      with:
        file_or_dir: k8s/
        config_file: .yamllint.yml

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Dry-run apply (kubectl validation)
      run: |
        for file in k8s/*.yaml; do
          echo "Validating $file"
          # Лучше использовать --dry-run=server, но нужен кластер
          # Поэтому используем kubeval вместо kubectl
          kubeval --strict --ignore-missing-schemas $file
        done